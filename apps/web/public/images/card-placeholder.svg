<svg xmlns="http://www.w3.org/2000/svg" width="630" height="880" viewBox="0 0 630 880">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect width="630" height="880" rx="32" ry="32"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="630" height="880" rx="32" ry="32" fill="url(#bg)"/>

  <!-- Noise overlay (clipped to rounded card shape) -->
  <rect width="630" height="880" filter="url(#noise)" opacity="0.08" clip-path="url(#card-clip)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="626" height="876" rx="30" ry="30" fill="none" stroke="url(#border)" stroke-width="1.5"/>

  <!-- Inner frame -->
  <rect x="40" y="40" width="550" height="800" rx="16" ry="16" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

