server {
    listen 443 ssl;
    server_name monitoring.openrift.app;

    ssl_certificate     /home/openrift/openrift/certs/origin.pem;
    ssl_certificate_key /home/openrift/openrift/certs/origin-key.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Basic auth (generate with: htpasswd -c /home/openrift/openrift/certs/.htpasswd admin)
    auth_basic "Monitoring";
    auth_basic_user_file /home/openrift/openrift/certs/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Grafana live features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name monitoring.openrift.app;
    return 301 https://$server_name$request_uri;
}
