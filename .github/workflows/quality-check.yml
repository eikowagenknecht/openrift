name: Quality Check

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  # Allow to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  DO_NOT_TRACK: 1

jobs:
  build-api:
    # Do not run for automated release commits (otherwise we would run into a deadlock situation)
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-build-api-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-build-api-${{ runner.os }}-

      - name: Build api
        run: bun x turbo run build --filter=api

  build-web:
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-build-web-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-build-web-${{ runner.os }}-

      - name: Build web
        run: bun x turbo run build --filter=web

  test:
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-

      - name: Test
        run: bun run test

  lint:
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
