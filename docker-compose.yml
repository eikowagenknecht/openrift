# Dev:  docker compose up db       (just Postgres; run API + Vite natively with bun dev)
# Prod: docker compose up -d       (Postgres + app + web)
services:
  # PostgreSQL database.
  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

  # Hono API server (runs migrations on startup, schedules cron jobs).
  api:
    image: ghcr.io/eikowagenknecht/openrift-api:${IMAGE_TAG:-latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      CRON_ENABLED: ${CRON_ENABLED:-true}
      CRON_TCGPLAYER: ${CRON_TCGPLAYER:-0 6 * * *}
      CRON_CARDMARKET: ${CRON_CARDMARKET:-15 6 * * *}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

  # Nginx: serves the SPA and proxies /api to the api container.
  web:
    image: ghcr.io/eikowagenknecht/openrift-web:${IMAGE_TAG:-latest}
    depends_on:
      - api
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

volumes:
  pg_data:
