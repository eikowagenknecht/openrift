# Dev:  docker compose up db       (just Postgres; run API + Vite natively with bun dev)
# Prod: docker compose up -d       (Postgres + app + web)
services:
  # PostgreSQL database.
  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

  # Hono API server (runs migrations on startup, schedules cron jobs).
  api:
    image: ghcr.io/eikowagenknecht/openrift-api:${IMAGE_TAG:-latest}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

  # Nginx: serves the SPA and proxies /api to the api container.
  web:
    image: ghcr.io/eikowagenknecht/openrift-web:${IMAGE_TAG:-latest}
    depends_on:
      - api
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

volumes:
  pg_data:
